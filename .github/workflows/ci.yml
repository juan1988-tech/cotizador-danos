name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ════════════════════════════════════════════════════════════
  #  BACKEND — Lint + Unit Tests + Integration Tests
  #  Stack: Node.js + Express + TypeScript + Jest
  # ════════════════════════════════════════════════════════════
  backend:
    name: "🔧 Backend Tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: plataforma-danos-back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plataforma-danos-back/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & integration tests
        run: npm test -- --passWithNoTests

  # ════════════════════════════════════════════════════════════
  #  FRONTEND — Lint + Unit Tests
  #  Stack: React + TypeScript + Vite + Vitest
  # ════════════════════════════════════════════════════════════
  frontend:
    name: "🌐 Frontend Tests"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: cotizador-danos-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cotizador-danos-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ════════════════════════════════════════════════════════════
  #  VULNERABILITY SCAN (Trivy + SARIF)
  # ════════════════════════════════════════════════════════════
  vulnerability-scan:
    name: "🛡️ Vulnerability Scan (${{ matrix.target }})"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: backend
            path: plataforma-danos-back
          - target: frontend
            path: cotizador-danos-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Trivy SARIF
        uses: aquasecurity/trivy-action@master
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          scan-type: fs
          scan-ref: ${{ matrix.path }}
          format: sarif
          output: ${{ runner.temp }}/trivy-${{ matrix.target }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
          ignore-unfixed: true

      - name: Check SARIF file
        id: sarif
        shell: bash
        run: |
          SARIF_PATH="${{ runner.temp }}/trivy-${{ matrix.target }}.sarif"
          if [ -f "$SARIF_PATH" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "SARIF file not found: $SARIF_PATH"
          fi

      - name: Upload SARIF
        if: always() && steps.sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/trivy-${{ matrix.target }}.sarif
          category: trivy-${{ matrix.target }}

      - name: Enforce vulnerability policy
        uses: aquasecurity/trivy-action@master
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          scan-type: fs
          scan-ref: ${{ matrix.path }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
