# =============================================================================
# GitLab CI/CD Ś cotizador-danos (monorepo)
# SPEC-001-CICD
# =============================================================================
# Variables sensibles definir en GitLab ? Settings ? CI/CD ? Variables:
#   DB_HOST, DB_NAME, DB_USER, DB_PASSWORD, VITE_API_URL, CORE_SERVICE_URL
# =============================================================================

default:
  image: node:20-alpine

stages:
  - install
  - lint
  - test
  - build
  - deploy

# ---------------------------------------------------------------------------
# Variables de entorno no sensibles
# ---------------------------------------------------------------------------
variables:
  NODE_ENV: "test"
  PORT: "3000"
  HOST: "0.0.0.0"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "cotizador_danos"
  DB_USER: "ci_user"
  DB_PASSWORD: "ci_password"
  POSTGRES_DB: "cotizador_danos"
  POSTGRES_USER: "ci_user"
  POSTGRES_PASSWORD: "ci_password"
  CORE_SERVICE_URL: "http://localhost:3001"
  CORE_SERVICE_TIMEOUT: "5000"
  OPTIMISTIC_LOCK_MAX_RETRIES: "3"
  CALCULATION_TIMEOUT: "10000"
  LOG_LEVEL: "error"
  LOG_FORMAT: "combined"

# ===========================================================================
# STAGE: install
# ===========================================================================
install:backend:
  stage: install
  cache:
    key:
      files:
        - plataforma-danos-back/package-lock.json
    paths:
      - plataforma-danos-back/node_modules/
    policy: pull-push
  script:
    - cd plataforma-danos-back
    - npm ci --prefer-offline
  artifacts:
    paths:
      - plataforma-danos-back/node_modules/
    expire_in: 1 hour

install:frontend:
  stage: install
  cache:
    key:
      files:
        - cotizador-danos-web/package-lock.json
    paths:
      - cotizador-danos-web/node_modules/
    policy: pull-push
  script:
    - cd cotizador-danos-web
    - npm ci --prefer-offline
  artifacts:
    paths:
      - cotizador-danos-web/node_modules/
    expire_in: 1 hour

# ===========================================================================
# STAGE: lint
# ===========================================================================
lint:backend:
  stage: lint
  needs: [install:backend]
  script:
    - cd plataforma-danos-back
    - npm run lint

lint:frontend:
  stage: lint
  needs: [install:frontend]
  script:
    - cd cotizador-danos-web
    - npm run lint

# ===========================================================================
# STAGE: test
# ===========================================================================
test:backend:
  stage: test
  needs: [install:backend]
  services:
    - name: postgres:15-alpine
      alias: postgres
  variables:
    POSTGRES_DB: "cotizador_danos"
    POSTGRES_USER: "ci_user"
    POSTGRES_PASSWORD: "ci_password"
    DB_HOST: "postgres"
  before_script:
    - apk add --no-cache postgresql-client
    - |
      until pg_isready -h postgres -p 5432 -U ci_user; do
        echo "Esperando a PostgreSQL..."; sleep 2
      done
    - PGPASSWORD=ci_password psql -h postgres -U ci_user -d cotizador_danos -f plataforma-danos-back/database/schema.sql || true
  script:
    - cd plataforma-danos-back
    - npm run test -- --forceExit --passWithNoTests
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  artifacts:
    when: always
    paths:
      - plataforma-danos-back/coverage/
    expire_in: 7 days

test:frontend:
  stage: test
  needs: [install:frontend]
  script:
    - cd cotizador-danos-web
    - npm run test
  artifacts:
    when: always
    paths:
      - cotizador-danos-web/coverage/
    expire_in: 7 days

# ===========================================================================
# STAGE: build
# ===========================================================================
build:backend:
  stage: build
  needs: [test:backend]
  script:
    - cd plataforma-danos-back
    - npm run build
  artifacts:
    paths:
      - plataforma-danos-back/dist/
    expire_in: 7 days

build:frontend:
  stage: build
  needs: [test:frontend]
  variables:
    VITE_API_URL: "${VITE_API_URL}"
  script:
    - cd cotizador-danos-web
    - npm run build
  artifacts:
    paths:
      - cotizador-danos-web/dist/
    expire_in: 7 days

# ===========================================================================
# STAGE: deploy Ś solo en ramas protegidas main/master
# ===========================================================================
deploy:
  stage: deploy
  needs: [build:backend, build:frontend]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      when: on_success
    - when: never
  environment:
    name: production
  script:
    - echo "Desplegando version $CI_COMMIT_SHORT_SHA en $CI_ENVIRONMENT_NAME"
    # Personalizar con el comando de despliegue real, por ejemplo:
    # - ssh $DEPLOY_USER@$DEPLOY_HOST "cd /app && docker compose pull && docker compose up -d"
    - echo "Deploy completado."
