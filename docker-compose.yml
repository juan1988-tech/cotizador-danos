services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: cotizador-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./plataforma-danos-back/database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cotizador-network

  # Backend API
  backend:
    build:
      context: ./plataforma-danos-back
      dockerfile: Dockerfile
    container_name: cotizador-backend
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./plataforma-danos-back:/app
      - /app/node_modules
    networks:
      - cotizador-network
    command: npm run dev

  # Frontend SPA
  frontend:
    build:
      context: ./cotizador-danos-web
      dockerfile: Dockerfile
    container_name: cotizador-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    volumes:
      - ./cotizador-danos-web:/app
      - /app/node_modules
    networks:
      - cotizador-network
    command: npm run dev -- --host

  # PgAdmin (opcional, para gestión de BD)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cotizador-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5051:80"
    depends_on:
      - postgres
    networks:
      - cotizador-network

volumes:
  postgres_data:

networks:
  cotizador-network:
    driver: bridge